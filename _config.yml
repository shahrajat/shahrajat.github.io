# --- Site --- #

url: "https://shahrajat.github.io"
baseurl: ""

title: Rajat Shah
description: Senior Software Engineer building ML infrastructure at scale

# --- Navigation --- #

navbar-links:
  Work: "work"
  Projects: "projects"
  Research: "research"
  Writing: "writing"
  About: "aboutme"
  Resume: "https://shahrajat.github.io/resume.pdf"

# --- Author --- #

author:
  name: Rajat Shah
  email: "me@shahrajat.com"
  github: shahrajat
  linkedin: in/rajatsshah

# --- Build --- #

timezone: "America/Vancouver"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/

kramdown:
  input: GFM

# --- Defaults --- #

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  -
    scope:
      path: ""
    values:
      layout: "page"

link-tags: false

exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - CNAME
  - Vagrantfile

plugins:
  - jekyll-seo-tag
