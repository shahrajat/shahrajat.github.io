---
layout: base
---

<div class="container">
  <div class="post-header">
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}
    <p class="subtitle">{{ page.subtitle }}</p>
    {% endif %}
    <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</p>
  </div>
  <div class="post-content">
    {{ content }}
  </div>
  {% if page.tags %}
  <div class="text-muted" style="font-size: 0.85rem; margin-top: 2rem;">
    Tags: {{ page.tags | join: ", " }}
  </div>
  {% endif %}
</div>
